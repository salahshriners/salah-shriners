<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="images/inline/inline_01.png">
  <link rel="apple-touch-icon" href="images/inline/inline_02.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Salah Shriners SC — Fraternidade, Filantropia e Diversão. Em breve!">
  <title>Salah Shriners SC — Em Breve</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: #1a0505;
      color: #f9f8f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      padding: 2rem 1.5rem;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(132,21,21,0.45) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(222,181,80,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .container { position: relative; z-index: 1; text-align: center; max-width: 720px; width: 100%; }
    .logo-wrap { margin-bottom: 2.2rem; }
    .logo-wrap img {
      width: 110px; height: auto; margin: 0 auto;
      filter: drop-shadow(0 4px 24px rgba(222,181,80,0.35));
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .gold-line { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, #deb550, transparent); margin: 0 auto 1.6rem; }
    .title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; letter-spacing: 0.02em; line-height: 1.15; color: #f9f8f5; margin-bottom: 0.5rem; }
    .title span { color: #deb550; }
    .subtitle { font-size: clamp(0.95rem, 2.2vw, 1.15rem); font-weight: 300; color: rgba(249,248,245,0.65); margin-bottom: 3rem; letter-spacing: 0.04em; text-transform: uppercase; }
    .countdown { display: flex; justify-content: center; gap: clamp(0.8rem, 3vw, 2rem); margin-bottom: 3rem; flex-wrap: wrap; }
    .cd-block { display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.04); border: 1px solid rgba(222,181,80,0.2); border-radius: 12px; padding: clamp(0.9rem, 2.5vw, 1.4rem) clamp(1rem, 3vw, 1.8rem); min-width: clamp(72px, 16vw, 100px); backdrop-filter: blur(6px); transition: border-color 0.3s; }
    .cd-block:hover { border-color: rgba(222,181,80,0.5); }
    .cd-num { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 6vw, 3.6rem); font-weight: 900; color: #deb550; line-height: 1; letter-spacing: -0.02em; min-width: 2ch; text-align: center; }
    .cd-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(249,248,245,0.5); margin-top: 0.45rem; }
    .cd-sep { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 900; color: rgba(222,181,80,0.4); align-self: center; padding-bottom: 1.4rem; animation: blink 1s step-start infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    .tagline { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1rem, 2.5vw, 1.2rem); color: rgba(249,248,245,0.55); margin-bottom: 2.2rem; letter-spacing: 0.02em; }
    footer { position: relative; z-index: 1; margin-top: 3rem; font-size: 0.78rem; color: rgba(249,248,245,0.3); letter-spacing: 0.05em; }
    footer a { color: rgba(222,181,80,0.5); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: #deb550; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap"><img src="images/inline/inline_01.png" alt="Salah Shriners SC"></div>
    <div class="gold-line"></div>
    <h1 class="title">Salah <span>Shriners</span> SC</h1>
    <p class="subtitle">Fraternidade &middot; Filantropia &middot; Diversão</p>
    <div class="countdown" id="countdown">
      <div class="cd-block"><span class="cd-num" id="cd-days">00</span><span class="cd-label">Dias</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-block"><span class="cd-num" id="cd-hours">00</span><span class="cd-label">Horas</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-block"><span class="cd-num" id="cd-mins">00</span><span class="cd-label">Minutos</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-block"><span class="cd-num" id="cd-secs">00</span><span class="cd-label">Segundos</span></div>
    </div>
    <p class="tagline">"Em breve, um novo capítulo começa."</p>
  </div>
  <footer>&copy; 2026 Salah Shriners SC &mdash; Todos os direitos reservados</footer>
  <script>
    const TARGET = new Date(2026, 5, 21, 0, 0, 0);
    function pad(n) { return String(n).padStart(2, '0'); }
    function tick() {
      const diff = TARGET - new Date();
      if (diff <= 0) { ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => document.getElementById(id).textContent = '00'); return; }
      document.getElementById('cd-days').textContent  = pad(Math.floor(diff / 86400000));
      document.getElementById('cd-hours').textContent = pad(Math.floor((diff % 86400000) / 3600000));
      document.getElementById('cd-mins').textContent  = pad(Math.floor((diff % 3600000) / 60000));
      document.getElementById('cd-secs').textContent  = pad(Math.floor((diff % 60000) / 1000));
    }
    tick(); setInterval(tick, 1000);
  </script>
</body>
</html>
