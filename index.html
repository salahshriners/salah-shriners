<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salah Shriners — Em Breve</title>
  <link rel="icon" type="image/png" href="images/logo/brasao-vetorizado-transp.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      background: #1a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Open Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139,0,0,0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(139,0,0,0.2) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.1) 0%, transparent 50%);
      pointer-events: none;
    }
    .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .star { position: absolute; background: #d4af37; border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite; opacity: 0; }
    @keyframes twinkle { 0%,100%{opacity:0;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.5)} }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 2rem;
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
    }

    .ornament { display: flex; align-items: center; gap: 1rem; }
    .ornament-line { height: 1px; width: 70px; background: linear-gradient(to right, transparent, #d4af37); }
    .ornament-line.right { background: linear-gradient(to left, transparent, #d4af37); }
    .ornament-symbol { color: #d4af37; font-size: 1.1rem; }

    .logo-container img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(212,175,55,0.4));
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{filter:drop-shadow(0 0 12px rgba(212,175,55,0.3))}
      50%{filter:drop-shadow(0 0 28px rgba(212,175,55,0.6))}
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 4.5vw, 3rem);
      color: #d4af37;
      letter-spacing: 0.08em;
      text-shadow: 0 0 30px rgba(212,175,55,0.3);
    }
    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.75rem, 1.5vw, 1rem);
      color: rgba(212,175,55,0.6);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: -0.5rem;
    }
    .message {
      color: rgba(255,255,255,0.75);
      font-size: clamp(0.9rem, 1.5vw, 1.05rem);
      font-weight: 300;
      line-height: 1.7;
    }
    .message strong { color: #d4af37; font-weight: 600; }

    .countdown-label {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      color: rgba(212,175,55,0.5);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: -0.4rem;
    }
    .countdown { display: flex; justify-content: center; gap: 1.4rem; }
    .countdown-item { display: flex; flex-direction: column; align-items: center; }
    .countdown-number {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.4rem, 6vw, 3.4rem);
      font-weight: 700;
      color: #fff;
      line-height: 1;
      min-width: 88px;
      background: rgba(139,0,0,0.3);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 10px;
      padding: 0.6rem 0.8rem;
      text-shadow: 0 0 20px rgba(212,175,55,0.3);
    }
    .countdown-unit {
      font-size: 0.62rem;
      color: rgba(212,175,55,0.6);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }
    .launch-date {
      border-top: 1px solid rgba(212,175,55,0.2);
      padding-top: 0.9rem;
      color: rgba(255,255,255,0.5);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      width: 100%;
    }
    .launch-date span { color: #d4af37; font-weight: 600; }

    @media (max-height: 700px) {
      .container { gap: 0.7rem; }
      .logo-container img { width: 75px; height: 75px; }
      h1 { font-size: 1.8rem; }
      .countdown-number { font-size: 2.1rem; min-width: 70px; padding: 0.45rem 0.6rem; }
    }
    @media (max-width: 480px) {
      .countdown { gap: 0.8rem; }
      .countdown-number { min-width: 68px; font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="container">
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-symbol">✦</div>
      <div class="ornament-line right"></div>
    </div>
    <div class="logo-container">
      <img src="images/logo/brasao-vetorizado-transp.png" alt="Salah Shriners">
    </div>
    <h1>Salah Shriners</h1>
    <p class="subtitle">Fraternidade &middot; Filantropia &middot; Família</p>
    <p class="message">
      Estamos preparando algo especial para você.<br>
      Nosso novo site será inaugurado em <strong>02 de abril de 2026 às 14h</strong>. Aguarde!
    </p>
    <p class="countdown-label">Inauguração em</p>
    <div class="countdown">
      <div class="countdown-item"><div class="countdown-number" id="days">00</div><div class="countdown-unit">Dias</div></div>
      <div class="countdown-item"><div class="countdown-number" id="hours">00</div><div class="countdown-unit">Horas</div></div>
      <div class="countdown-item"><div class="countdown-number" id="minutes">00</div><div class="countdown-unit">Min</div></div>
      <div class="countdown-item"><div class="countdown-number" id="seconds">00</div><div class="countdown-unit">Seg</div></div>
    </div>
    <div class="launch-date">
      Inauguração oficial: <span>quinta-feira, 02 de abril de 2026 às 14h</span>
    </div>
  </div>
  <script>
    const s=document.getElementById('stars');
    for(let i=0;i<60;i++){const el=document.createElement('div');el.className='star';el.style.left=Math.random()*100+'%';el.style.top=Math.random()*100+'%';el.style.setProperty('--dur',(2+Math.random()*4)+'s');el.style.animationDelay=Math.random()*4+'s';const sz=(1+Math.random()*2)+'px';el.style.width=el.style.height=sz;s.appendChild(el);}
    const target=new Date('2026-04-02T14:00:00-03:00');
    function update(){
      const diff=target-new Date();
      if(diff<=0){document.querySelector('.countdown').innerHTML='<p style="color:#d4af37;font-family:Cinzel,serif;font-size:1.5rem;">Bem-vindo ao novo site!</p>';return;}
      document.getElementById('days').textContent=String(Math.floor(diff/86400000)).padStart(2,'0');
      document.getElementById('hours').textContent=String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
      document.getElementById('minutes').textContent=String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
      document.getElementById('seconds').textContent=String(Math.floor((diff%60000)/1000)).padStart(2,'0');
    }
    update();setInterval(update,1000);
  </script>
</body>
</html>
