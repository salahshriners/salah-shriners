<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="images/inline/inline_01.png">
  <link rel="apple-touch-icon" href="images/inline/inline_01.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Salah Shriners — Fraternidade, Filantropia e Família. Em breve!">
  <title>Salah Shriners — Em Breve</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: #1a0505;
      color: #f9f8f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      padding: 2rem 1.5rem;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(132,21,21,0.50) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(222,181,80,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    #stars-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .container { position: relative; z-index: 1; text-align: center; max-width: 720px; width: 100%; }
    .logo-wrap { margin-bottom: 2rem; }
    .logo-wrap img {
      width: 160px;
      height: auto;
      margin: 0 auto;
      filter: drop-shadow(0 0 18px rgba(222,181,80,0.40)) drop-shadow(0 4px 10px rgba(0,0,0,0.7));
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
    .gold-line { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, #deb550, transparent); margin: 0 auto 1.6rem; }
    .title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; letter-spacing: 0.02em; line-height: 1.15; color: #f9f8f5; margin-bottom: 0.5rem; }
    .title span { color: #deb550; }
    .subtitle { font-size: clamp(0.9rem, 2vw, 1.1rem); font-weight: 300; color: rgba(249,248,245,0.65); margin-bottom: 3rem; letter-spacing: 0.06em; text-transform: uppercase; }
    .countdown {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr auto 1fr;
      align-items: center;
      justify-items: center;
      gap: 0 clamp(0.4rem, 1.5vw, 1rem);
      margin: 0 auto 3rem;
      width: 100%;
      max-width: 640px;
    }
    .cd-block { display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.04); border: 1px solid rgba(222,181,80,0.22); border-radius: 12px; padding: clamp(0.8rem, 2vw, 1.4rem) clamp(0.5rem, 2vw, 1.3rem); width: 100%; backdrop-filter: blur(6px); transition: border-color 0.3s; }
    .cd-block:hover { border-color: rgba(222,181,80,0.5); }
    .cd-num { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.6rem); font-weight: 900; color: #deb550; line-height: 1; letter-spacing: -0.02em; min-width: 2ch; text-align: center; }
    .cd-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(249,248,245,0.45); margin-top: 0.4rem; }
    .cd-sep { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem, 3vw, 2.4rem); font-weight: 900; color: rgba(222,181,80,0.4); align-self: flex-start; margin-top: clamp(0.5rem, 1.5vw, 1rem); animation: blink 1s step-start infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
    .tagline { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1rem, 2.4vw, 1.2rem); color: rgba(249,248,245,0.5); margin-bottom: 2rem; letter-spacing: 0.02em; }
    footer { position: relative; z-index: 1; margin-top: 2.5rem; font-size: 0.75rem; color: rgba(249,248,245,0.25); letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <canvas id="stars-canvas"></canvas>
  <div class="container">
    <div class="logo-wrap">
      <img src="images/logo/brasao-vetorizado-transp.png" alt="Salah Shriners">
    </div>
    <div class="gold-line"></div>
    <h1 class="title">Salah <span>Shriners</span></h1>
    <p class="subtitle">Fraternidade &middot; Filantropia &middot; Família</p>
    <div class="countdown" id="countdown">
      <div class="cd-block"><span class="cd-num" id="cd-days">00</span><span class="cd-label">Dias</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-block"><span class="cd-num" id="cd-hours">00</span><span class="cd-label">Horas</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-block"><span class="cd-num" id="cd-mins">00</span><span class="cd-label">Minutos</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-block"><span class="cd-num" id="cd-secs">00</span><span class="cd-label">Segundos</span></div>
    </div>
    <p class="tagline">"Em breve, um novo capítulo começa."</p>
  </div>
  <footer>&copy; 2026 Salah Shriners — Todos os direitos reservados</footer>
  <script>
    const TARGET = new Date(2026, 3, 2, 14, 0, 0);
    function pad(n) { return String(n).padStart(2, '0'); }
    function tick() {
      const diff = TARGET - new Date();
      if (diff <= 0) { ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => document.getElementById(id).textContent = '00'); return; }
      document.getElementById('cd-days').textContent  = pad(Math.floor(diff / 86400000));
      document.getElementById('cd-hours').textContent = pad(Math.floor((diff % 86400000) / 3600000));
      document.getElementById('cd-mins').textContent  = pad(Math.floor((diff % 3600000) / 60000));
      document.getElementById('cd-secs').textContent  = pad(Math.floor((diff % 60000) / 1000));
    }
    tick(); setInterval(tick, 1000);
    (function() {
      const canvas = document.getElementById('stars-canvas');
      const ctx = canvas.getContext('2d');
      const N = 160;
      let W, H, stars = [];
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      function mkStar() {
        return { x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.2+0.2,
          vx: (Math.random()-0.5)*0.25, vy: (Math.random()-0.5)*0.25,
          alpha: Math.random()*0.6+0.2, dAlpha: (Math.random()>0.5?1:-1)*(Math.random()*0.008+0.002) };
      }
      function init() { resize(); stars = Array.from({length:N}, mkStar); }
      function draw() {
        ctx.clearRect(0,0,W,H);
        for (const s of stars) {
          s.x+=s.vx; s.y+=s.vy;
          if(s.x<0)s.x=W; if(s.x>W)s.x=0; if(s.y<0)s.y=H; if(s.y>H)s.y=0;
          s.alpha+=s.dAlpha;
          if(s.alpha>0.85||s.alpha<0.1)s.dAlpha*=-1;
          ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
          ctx.fillStyle='rgba(255,240,200,'+s.alpha+')'; ctx.fill();
        }
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize', resize);
      init(); draw();
    })();
  </script>
</body>
</html>
