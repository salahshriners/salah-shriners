<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salah Shriners SC — Em Breve</title>
  <link rel="icon" type="image/png" href="images/logo/brasao-vetorizado-transp.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: #1a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Open Sans', sans-serif; overflow: hidden; position: relative; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(139,0,0,0.3) 0%, transparent 60%), radial-gradient(ellipse at 80% 50%, rgba(139,0,0,0.2) 0%, transparent 60%), radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.1) 0%, transparent 50%); pointer-events: none; }
    .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .star { position: absolute; width: 2px; height: 2px; background: #d4af37; border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite; opacity: 0; }
    @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.5); } }
    .container { position: relative; text-align: center; padding: 2rem; max-width: 700px; width: 100%; z-index: 1; }
    .ornament { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
    .ornament-line { height: 1px; width: 80px; background: linear-gradient(to right, transparent, #d4af37); }
    .ornament-line.right { background: linear-gradient(to left, transparent, #d4af37); }
    .ornament-symbol { color: #d4af37; font-size: 1.2rem; }
    .logo-container { margin-bottom: 1.5rem; }
    .logo-container img { width: 110px; height: 110px; object-fit: contain; filter: drop-shadow(0 0 20px rgba(212,175,55,0.4)); animation: pulse 3s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { filter: drop-shadow(0 0 15px rgba(212,175,55,0.3)); } 50% { filter: drop-shadow(0 0 30px rgba(212,175,55,0.6)); } }
    h1 { font-family: 'Cinzel', serif; font-size: clamp(1.8rem, 5vw, 2.8rem); color: #d4af37; letter-spacing: 0.08em; text-shadow: 0 0 30px rgba(212,175,55,0.3); margin-bottom: 0.4rem; }
    .subtitle { font-family: 'Cinzel', serif; font-size: clamp(0.9rem, 2vw, 1.1rem); color: rgba(212,175,55,0.6); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 2.5rem; }
    .message { color: rgba(255,255,255,0.75); font-size: 1rem; font-weight: 300; line-height: 1.8; margin-bottom: 3rem; padding: 0 1rem; }
    .message strong { color: #d4af37; font-weight: 600; }
    .countdown-label { font-family: 'Cinzel', serif; font-size: 0.75rem; color: rgba(212,175,55,0.5); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 1.2rem; }
    .countdown { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 3rem; }
    .countdown-item { display: flex; flex-direction: column; align-items: center; }
    .countdown-number { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 7vw, 3.5rem); font-weight: 700; color: #fff; line-height: 1; min-width: 80px; background: rgba(139,0,0,0.3); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; padding: 0.6rem 0.8rem; text-shadow: 0 0 20px rgba(212,175,55,0.3); }
    .countdown-unit { font-size: 0.65rem; color: rgba(212,175,55,0.6); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 0.5rem; }
    .launch-date { border-top: 1px solid rgba(212,175,55,0.15); padding-top: 2rem; color: rgba(255,255,255,0.5); font-size: 0.85rem; letter-spacing: 0.05em; }
    .launch-date span { color: #d4af37; font-weight: 600; }
    @media (max-width: 480px) { .countdown { gap: 0.8rem; } .countdown-number { min-width: 60px; font-size: 2.2rem; padding: 0.5rem; } }
  </style>
